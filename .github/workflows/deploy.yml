name: Deploy Calendar to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 1 * *"   # Refresh prayer times on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write   # commit refreshed .ics back to repo
  pages: write      # deploy to Pages
  id-token: write   # OIDC token for Pages deployment

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Regenerate calendar
        working-directory: salah-calendar
        run: python generate.py

      - name: Copy ICS to docs/
        run: cp salah-calendar/malmo-sweden.ics docs/malmo-sweden.ics

      - name: Commit refreshed ICS back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/malmo-sweden.ics salah-calendar/malmo-sweden.ics
          git diff --cached --quiet || git commit -m "chore: refresh calendar [skip ci]" && git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
