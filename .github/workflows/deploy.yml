name: Refresh Calendar

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 1 * *"   # Re-fetch prayer times on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the refreshed .ics back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Regenerate calendar
        working-directory: salah-calendar
        run: python generate.py

      - name: Copy refreshed ICS to docs/ (served by GitHub Pages)
        run: cp salah-calendar/malmo-sweden.ics docs/malmo-sweden.ics

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/malmo-sweden.ics salah-calendar/malmo-sweden.ics
          git diff --cached --quiet || git commit -m "chore(calendar): refresh prayer times [skip ci]"
          git push
